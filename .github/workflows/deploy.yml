name: AWS CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t codealpha-devops-project .

      - name: Tag Docker image
        run: |
          docker tag codealpha-devops-project:latest 029247419664.dkr.ecr.us-east-1.amazonaws.com/codealpha-devops-project:latest

      - name: Push Docker image
        run: |
          docker push 029247419664.dkr.ecr.us-east-1.amazonaws.com/codealpha-devops-project:latest


  deploy-to-ec2:

    needs: build-and-push

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd aws-cicd-project
            ./deploy.sh

